<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Card background -->
  <rect width="64" height="64" rx="8" fill="#f5f5f5"/>
  <rect x="4" y="4" width="56" height="56" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Top left A and heart -->
  <text x="10" y="18" font-family="serif" font-size="14" font-weight="bold" fill="#e74c3c">A</text>
  <path d="M 10 22 L 12 25 L 14 22 Q 15 20 14 18 Q 13 16 12 16 Q 11 16 10 18 Q 9 20 10 22 Z" fill="#e74c3c"/>
  
  <!-- Center large heart -->
  <path d="M 32 28 L 38 35 L 44 28 Q 47 24 44 20 Q 42 17 38 17 Q 36 17 34 19 Q 32 17 30 17 Q 26 17 24 20 Q 21 24 24 28 L 30 35 L 32 37 L 34 35 L 38 35 Z" fill="#e74c3c"/>
  
  <!-- Bottom right A and heart (rotated) -->
  <g transform="rotate(180 54 54)">
    <text x="48" y="18" font-family="serif" font-size="14" font-weight="bold" fill="#e74c3c">A</text>
    <path d="M 48 22 L 50 25 L 52 22 Q 53 20 52 18 Q 51 16 50 16 Q 49 16 48 18 Q 47 20 48 22 Z" fill="#e74c3c"/>
