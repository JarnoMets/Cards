apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: card-scorer-ingress
  namespace: cards
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-production"
spec:
  tls:
  - hosts:
    - cards.homelab.local
    secretName: card-scorer-tls
  rules:
  - host: cards.homelab.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80